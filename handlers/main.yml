---
- name: Run newaliases
  ansible.builtin.command: newaliases
  changed_when: true
- name: Run intelmqctl reload
  ansible.builtin.command:
    argv:
      - intelmqctl
      - reload
  changed_when: true
- name: Restart webserver
  ansible.builtin.service:
    name: "apache2"
    state: restarted
- name: Restart postgresql
  ansible.builtin.service:
    name: postgresql
    state: restarted
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
