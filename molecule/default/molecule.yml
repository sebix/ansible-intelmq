---
dependency:
  name: galaxy
  options:
    role-file: requirements.yml
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: ansible-intelmq-ubuntu-noble
    image: "geerlingguy/docker-ubuntu2404-ansible:latest"
    command: /lib/systemd/systemd
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
provisioner:
  log: true
  name: ansible
verifier:
  name: ansible
