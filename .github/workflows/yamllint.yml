---
name: Yaml Lint

on: [push, pull_request]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
